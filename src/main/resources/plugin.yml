name: ViewDistanceControl
version: '${version}'
main: org.rainbowhunter.viewdistancecontrol.ViewDistanceControl
api-version: '26.1'
description: Per-player view distance control via LuckPerms
authors:
  - RainbowHunter
depend:
  - LuckPerms
  - PlaceholderAPI

softdepend:
  - CMI
  - Essentials

commands:
  vdc:
    description: View Distance Control
    usage: /vdc <reload|get <player>|list>

permissions:
  viewdistancecontrol.reload:
    description: Allows reloading the plugin config
    default: op
  viewdistancecontrol.get:
    description: Allows viewing a player's view distance
    default: op
  viewdistancecontrol.default.*:
    description: Wildcard for normal view distance nodes
    default: false
  viewdistancecontrol.afk.*:
    description: Wildcard for AFK view distance nodes
    default: false
  viewdistancecontrol.max.*:
    description: Wildcard for view distance cap nodes
    default: false
  viewdistancecontrol.afkbypass:
    description: Bypasses AFK view distance reduction
    default: false
